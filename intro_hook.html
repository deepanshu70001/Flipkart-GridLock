<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro Hook - The Problem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-red: #1a0505;
            --alert-red: #EF4444;
            --alert-orange: #F97316;
            --dark-slate: #0f172a;
            --paper-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            background-color: black;
        }

        /* Split Screen Setup */
        .split {
            flex: 1;
            position: relative;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        /* LEFT SIDE: Chaotic Traffic */
        .left-side {
            background-color: var(--dark-red);
            border-right: 2px solid rgba(255,255,255,0.1);
        }

        /* Gridlock Animation */
        .gridlock-container {
            position: absolute;
            width: 150%;
            height: 150%;
            transform: rotate(-15deg);
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0.6;
        }

        .lane {
            width: 100%;
            height: 40px;
            display: flex;
            gap: 10px;
            animation: gridlock 8s infinite alternate cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        
        .lane:nth-child(even) {
            animation-direction: alternate-reverse;
            animation-duration: 12s;
        }

        .car {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--alert-red), var(--alert-orange));
            box-shadow: 0 0 15px var(--alert-red);
            opacity: 0.8;
            /* Add some jitter to individual cars to simulate frustration */
            animation: jitter 0.5s infinite alternate;
        }
        
        .car:nth-child(1) { width: 150px; animation-delay: 0.1s;}
        .car:nth-child(2) { width: 80px; animation-delay: 0.4s;}
        .car:nth-child(3) { width: 220px; animation-delay: 0.2s;}
        .car:nth-child(4) { width: 110px; animation-delay: 0.5s;}
        .car:nth-child(5) { width: 180px; animation-delay: 0.3s;}

        @keyframes gridlock {
            0% { transform: translateX(-10%); }
            20% { transform: translateX(-12%); } /* Stutter */
            25% { transform: translateX(-5%); }
            50% { transform: translateX(-5%); } /* Stuck */
            70% { transform: translateX(2%); }
            100% { transform: translateX(5%); }
        }

        @keyframes jitter {
            0% { transform: translateY(0); }
            100% { transform: translateY(1px) scale(0.99); }
        }

        /* RIGHT SIDE: Manual Chaos */
        .right-side {
            background-color: var(--dark-slate);
            border-left: 2px solid rgba(255,255,255,0.1);
        }

        /* Paper & Radio Animation */
        .manual-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .paper {
            position: absolute;
            width: 120px;
            height: 160px;
            background: var(--paper-color);
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            /* Abstract text lines */
            background-image: repeating-linear-gradient(180deg, transparent, transparent 15px, #cbd5e1 15px, #cbd5e1 18px);
            background-position: 0 20px;
            background-repeat: no-repeat;
            background-size: 80% 80%;
            opacity: 0;
        }

        /* Generate multiple papers piling up */
        .paper:nth-child(1) { top: -200px; left: 20%; animation: dropPaper 4s infinite 0s; }
        .paper:nth-child(2) { top: -200px; left: 50%; animation: dropPaper 5s infinite 1.2s; }
        .paper:nth-child(3) { top: -200px; left: 30%; animation: dropPaper 4.5s infinite 2.5s; }
        .paper:nth-child(4) { top: -200px; left: 60%; animation: dropPaper 6s infinite 0.8s; }
        .paper:nth-child(5) { top: -200px; left: 40%; animation: dropPaper 5.5s infinite 3s; }

        @keyframes dropPaper {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            80% { transform: translateY(120vh) rotate(360deg); opacity: 0.9; }
            100% { opacity: 0; }
        }

        .radio-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border: 4px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulseWave 2s infinite cubic-bezier(0.0, 0.0, 0.2, 1);
        }
        .radio-wave:nth-child(6) { animation-delay: 0s; }
        .radio-wave:nth-child(7) { animation-delay: 0.5s; }
        .radio-wave:nth-child(8) { animation-delay: 1s; }

        @keyframes pulseWave {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 500px; height: 500px; opacity: 0; border-width: 1px; }
        }


        /* Text Overlays */
        .title-overlay {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            z-index: 100;
            animation: fadeIn 2s ease forwards;
        }

        .title-overlay h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: 900;
            color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 10px 40px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .side-text {
            position: absolute;
            z-index: 50;
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards 1s;
        }

        .left-text {
            color: white;
        }
        .left-text span {
            display: block;
            font-size: 1.5rem;
            color: var(--alert-red);
            margin-top: 10px;
            letter-spacing: 5px;
        }

        .right-text {
            color: white;
        }
        .right-text span {
            display: block;
            font-size: 1.5rem;
            color: #94A3B8;
            margin-top: 10px;
            letter-spacing: 5px;
        }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Flashing effect for chaos */
        .flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.05);
            animation: strobe 0.1s infinite alternate;
            pointer-events: none;
            z-index: 10;
            display: none; /* Turn on for extreme chaos */
        }
        
    </style>
</head>
<body>

    <div class="title-overlay">
        <h1>THE STATUS QUO</h1>
    </div>

    <!-- LEFT SIDE: Traffic Chaos -->
    <div class="split left-side">
        <div class="gridlock-container">
            <!-- Multiple lanes of gridlocked traffic -->
            <div class="lane"><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div></div>
            <div class="lane"><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div></div>
            <div class="lane"><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div></div>
            <div class="lane"><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div></div>
            <div class="lane"><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div></div>
            <div class="lane"><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div></div>
            <div class="lane"><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div></div>
            <div class="lane"><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div><div class="car"></div></div>
        </div>

        <div class="side-text left-text">
            GRIDLOCK
            <span>Frustration & Delays</span>
        </div>
    </div>

    <!-- RIGHT SIDE: Manual Chaos -->
    <div class="split right-side">
        <div class="manual-container">
            <!-- Falling papers representing manual coordination -->
            <div class="paper"></div>
            <div class="paper"></div>
            <div class="paper"></div>
            <div class="paper"></div>
            <div class="paper"></div>

            <!-- Expanding radio waves -->
            <div class="radio-wave"></div>
            <div class="radio-wave"></div>
            <div class="radio-wave"></div>
        </div>

        <div class="side-text right-text">
            REACTIVE
            <span>Manual Coordination</span>
        </div>
    </div>

</body>
</html>
