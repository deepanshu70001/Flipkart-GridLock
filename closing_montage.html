<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closing Montage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06080F;
            --indigo: #6366F1;
            --emerald: #10B981;
            --rose: #F43F5E;
            --cyan: #06B6D4;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container for scenes */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
        }

        /* SCENE 1: Smooth Traffic */
        #scene-traffic {
            animation: sceneFadeInOut 2.5s ease-in-out 0s forwards;
        }
        .road {
            position: relative;
            width: 100%;
            height: 300px;
            background: rgba(255,255,255,0.02);
            border-top: 2px dashed rgba(255,255,255,0.1);
            border-bottom: 2px dashed rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .car {
            position: absolute;
            height: 4px;
            border-radius: 4px;
            box-shadow: 0 0 20px currentColor;
            animation: drive linear infinite;
        }
        /* Red tail lights moving away */
        .car1 { width: 150px; top: 60px; left: -200px; color: var(--rose); animation-duration: 1.2s; animation-delay: 0s; }
        .car2 { width: 250px; top: 100px; left: -300px; color: var(--rose); animation-duration: 1.8s; animation-delay: 0.5s; }
        .car3 { width: 100px; top: 140px; left: -150px; color: var(--rose); animation-duration: 0.9s; animation-delay: 0.2s; }
        
        /* White headlights moving closer */
        .car4 { width: 120px; top: 180px; right: -200px; color: white; animation: drive-reverse 1.5s linear infinite; }
        .car5 { width: 200px; top: 220px; right: -300px; color: white; animation: drive-reverse 1.1s linear infinite; animation-delay: 0.4s; }
        .car6 { width: 80px; top: 260px; right: -100px; color: white; animation: drive-reverse 2s linear infinite; animation-delay: 0.1s; }

        @keyframes drive { from { left: -300px; } to { left: 120%; } }
        @keyframes drive-reverse { from { right: -300px; } to { right: 120%; } }

        /* SCENE 2: Dashboard */
        #scene-dash {
            animation: sceneFadeInOut 2.5s ease-in-out 2.2s forwards;
            flex-direction: column;
        }
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            width: 800px;
        }
        .dash-card {
            background: #0D1117;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            height: 120px;
            position: relative;
            overflow: hidden;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 0.5s ease forwards;
        }
        .dash-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--indigo), var(--cyan));
        }
        .dash-card:nth-child(1) { animation-delay: 2.3s; }
        .dash-card:nth-child(2) { animation-delay: 2.5s; }
        .dash-card:nth-child(3) { animation-delay: 2.7s; }
        
        .dash-main {
            width: 800px;
            height: 300px;
            background: #0D1117;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-top: 20px;
            position: relative;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 0.5s ease forwards 2.9s;
            display: flex;
            align-items: flex-end;
            padding: 30px;
            box-sizing: border-box;
            gap: 15px;
        }
        .bar {
            flex: 1;
            background: linear-gradient(to top, var(--indigo), var(--cyan));
            border-radius: 4px 4px 0 0;
            height: 0%;
            animation: growBar 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0.8;
        }
        .bar:nth-child(1) { animation-delay: 3.1s; height: 40%; }
        .bar:nth-child(2) { animation-delay: 3.2s; height: 75%; }
        .bar:nth-child(3) { animation-delay: 3.3s; height: 50%; }
        .bar:nth-child(4) { animation-delay: 3.4s; height: 90%; }
        .bar:nth-child(5) { animation-delay: 3.5s; height: 65%; }

        @keyframes growBar { from { height: 0%; } to { } }

        /* SCENE 3: PDF Report */
        #scene-pdf {
            animation: sceneFadeInOut 2.5s ease-in-out 4.4s forwards;
        }
        .pdf-doc {
            width: 450px;
            height: 600px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            padding: 40px;
            box-sizing: border-box;
            transform: scale(0.8) rotate(-5deg) translateY(50px);
            opacity: 0;
            animation: docSlideIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 4.5s;
        }
        .pdf-header { width: 100%; height: 30px; background: var(--indigo); margin-bottom: 30px; border-radius: 4px; }
        .pdf-title { color: #0F172A; margin: 0 0 20px 0; font-weight: 900; font-size: 2rem; }
        .pdf-line { width: 100%; height: 12px; background: #E2E8F0; margin-bottom: 15px; border-radius: 6px; }
        .pdf-line.short { width: 60%; }
        .pdf-box { width: 100%; height: 180px; background: #F1F5F9; border: 2px dashed #CBD5E1; margin-top: 30px; border-radius: 8px; display: flex; justify-content: center; align-items: center;}
        .pdf-circle { width: 100px; height: 100px; border-radius: 50%; border: 15px solid var(--emerald); border-left-color: var(--rose); transform: rotate(45deg); }

        @keyframes docSlideIn {
            to { transform: scale(1) rotate(0deg) translateY(0); opacity: 1; }
        }

        /* SCENE 4: Final Logo & Text */
        #scene-final {
            animation: fadeStay 1s ease-in 6.6s forwards;
            flex-direction: column;
            background: radial-gradient(circle at center, rgba(99,102,241,0.15) 0%, var(--bg-dark) 70%);
        }
        .logo-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--indigo), var(--cyan));
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            transform: scale(0);
            box-shadow: 0 0 50px rgba(6,182,212,0.4);
            animation: popScale 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 6.8s;
        }
        .logo-circle svg { width: 70px; height: 70px; color: white; stroke-width: 2.5;}
        
        .final-text {
            display: flex;
            gap: 25px;
        }
        .word {
            font-size: 5.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(30px);
        }
        .word:nth-child(1) { color: white; animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 7.2s; }
        .word:nth-child(2) { color: var(--cyan); animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 7.5s; }
        .word:nth-child(3) { color: var(--emerald); animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 7.8s; }

        /* General Animations */
        @keyframes sceneFadeInOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeStay {
            to { opacity: 1; }
        }
        @keyframes popScale {
            to { transform: scale(1); }
        }
        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

    </style>
</head>
<body>

    <!-- Scene 1: Smooth Traffic -->
    <div class="scene" id="scene-traffic">
        <h2 style="position: absolute; top: 15%; letter-spacing: 8px; color: rgba(255,255,255,0.5); font-weight: 700;">LIVE TRAFFIC FLOW</h2>
        <div class="road">
            <div class="car car1"></div>
            <div class="car car2"></div>
            <div class="car car3"></div>
            <div class="car car4"></div>
            <div class="car car5"></div>
            <div class="car car6"></div>
        </div>
    </div>

    <!-- Scene 2: Dashboard -->
    <div class="scene" id="scene-dash">
        <h2 style="position: absolute; top: 15%; letter-spacing: 8px; color: rgba(255,255,255,0.5); font-weight: 700;">AI COMMAND CENTER</h2>
        <div class="dash-grid">
            <div class="dash-card"></div>
            <div class="dash-card"></div>
            <div class="dash-card"></div>
        </div>
        <div class="dash-main">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <!-- Scene 3: PDF Report -->
    <div class="scene" id="scene-pdf">
        <h2 style="position: absolute; top: 15%; letter-spacing: 8px; color: rgba(255,255,255,0.5); font-weight: 700;">ACTIONABLE INSIGHTS</h2>
        <div class="pdf-doc">
            <div class="pdf-header"></div>
            <h1 class="pdf-title">ACTION PLAN</h1>
            <div class="pdf-line"></div>
            <div class="pdf-line"></div>
            <div class="pdf-line short"></div>
            <div class="pdf-box">
                <div class="pdf-circle"></div>
            </div>
        </div>
    </div>

    <!-- Scene 4: Final Logo & Text -->
    <div class="scene" id="scene-final">
        <div class="logo-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
        </div>
        <div class="final-text">
            <div class="word">Predict.</div>
            <div class="word">Deploy.</div>
            <div class="word">Resolve.</div>
        </div>
    </div>

</body>
</html>
