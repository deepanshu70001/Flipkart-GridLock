# ==============================================================================
# Event-Driven Congestion Pipeline — Configuration
# ==============================================================================

data:
  raw_csv: "Astram event data_anonymized - Astram event data_anonymizedb40ac87 (1).csv"
  processed_parquet: "outputs/processed_events.parquet"
  timezone: "Asia/Kolkata"  # IST

spatial:
  h3_resolution: 8  # ~460m hexagons
  city_center_lat: 12.9716
  city_center_lng: 77.5946
  bbox:
    min_lat: 12.80
    max_lat: 13.27
    min_lng: 77.30
    max_lng: 77.77

temporal:
  rush_hours_morning: [8, 9, 10]  # IST
  rush_hours_evening: [17, 18, 19, 20]  # IST
  night_start: 22  # IST
  night_end: 6  # IST

features:
  lag_windows_hours: [6, 12, 24, 48, 168]  # 168 = 7 days
  target_encoding_smoothing: 10
  min_category_count: 5  # for rare category grouping

models:
  test_size: 0.2
  temporal_split_date: "2024-03-01"  # train before, test after
  random_state: 42
  
  severity:
    lgbm_params:
      n_estimators: 500
      learning_rate: 0.05
      max_depth: 7
      num_leaves: 63
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.1
      reg_lambda: 1.0
    xgb_params:
      n_estimators: 500
      learning_rate: 0.05
      max_depth: 6
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.1
      reg_lambda: 1.0
    catboost_params:
      iterations: 500
      learning_rate: 0.05
      depth: 7
      l2_leaf_reg: 3.0
    rf_params:
      n_estimators: 300
      max_depth: 12
      min_samples_leaf: 10

  duration:
    quantiles: [0.1, 0.25, 0.5, 0.75, 0.9]
    lgbm_params:
      n_estimators: 800
      learning_rate: 0.01
      max_depth: 5
      num_leaves: 15
      min_child_samples: 50
      subsample: 0.9
      colsample_bytree: 0.9
      reg_alpha: 0.0
      reg_lambda: 0.1

  closure:
    catboost_params:
      iterations: 500
      learning_rate: 0.05
      depth: 7
      l2_leaf_reg: 3.0
      auto_class_weights: "Balanced"

  clustering:
    min_cluster_size: 15
    min_samples: 5
    metric: "euclidean"

resource_recommender:
  manpower_base:
    vehicle_breakdown: 2
    accident: 4
    tree_fall: 3
    water_logging: 3
    construction: 3
    public_event: 8
    procession: 10
    vip_movement: 12
    protest: 10
    congestion: 4
    pot_holes: 2
    road_conditions: 2
    others: 2
  severity_multiplier:
    High: 1.5
    Low: 1.0
  rush_hour_multiplier: 1.3
  road_closure_multiplier: 1.5
  barricade_base:
    full_closure: 12
    partial_closure: 6
    no_closure: 0

outputs:
  models_dir: "outputs/models"
  plots_dir: "outputs/plots"
  reports_dir: "outputs/reports"
